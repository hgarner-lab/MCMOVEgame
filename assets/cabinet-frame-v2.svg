<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-label="Retro arcade cabinet frame">
  <defs>
    <linearGradient id="metal" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#26201d"/>
      <stop offset="0.45" stop-color="#0e0e10"/>
      <stop offset="1" stop-color="#030304"/>
    </linearGradient>
    <linearGradient id="deck" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2b241f"/>
      <stop offset="0.58" stop-color="#151312"/>
      <stop offset="1" stop-color="#080707"/>
    </linearGradient>
    <radialGradient id="buttonRed" cx="35%" cy="25%" r="70%">
      <stop offset="0" stop-color="#ff9c87"/>
      <stop offset="0.32" stop-color="#ff2c1f"/>
      <stop offset="1" stop-color="#6f0805"/>
    </radialGradient>
    <radialGradient id="buttonWhite" cx="35%" cy="25%" r="70%">
      <stop offset="0" stop-color="#fff8ef"/>
      <stop offset="0.48" stop-color="#e7ded4"/>
      <stop offset="1" stop-color="#756b62"/>
    </radialGradient>
    <radialGradient id="stick" cx="35%" cy="25%" r="68%">
      <stop offset="0" stop-color="#ff9080"/>
      <stop offset="0.42" stop-color="#d91810"/>
      <stop offset="1" stop-color="#610300"/>
    </radialGradient>
    <filter id="orangeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.78"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="6"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend mode="screen" in2="SourceGraphic"/>
    </filter>
    <pattern id="scratch" width="84" height="84" patternUnits="userSpaceOnUse" patternTransform="rotate(-18)">
      <path d="M4 11h38M15 44h58M6 71h30" stroke="#ff8a1f" stroke-opacity="0.08" stroke-width="1"/>
      <path d="M50 21h16M32 61h40" stroke="#fff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.15" fill="#ff7a18" opacity="0.65"/>
    </pattern>
    <style>
      .label{font-family:'Courier New',monospace;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
      .small{font-family:'Courier New',monospace;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
      .copy{font-family:Arial,Helvetica,sans-serif;font-weight:700}
    </style>
  </defs>

